name: cealctl release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  sign-release-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Download draft release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          mkdir -p dist
          gh release download "$TAG" --repo "$GH_REPO" --dir dist --pattern 'cealctl-*'
      - name: Sign cealctl binaries
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          for asset in dist/cealctl-*; do
            case "$asset" in
              *.sig|*.pem) continue ;;
            esac
            cosign sign-blob --yes \
              --output-signature "$asset.sig" \
              --output-certificate "$asset.pem" \
              "$asset"
            gh release upload "$TAG" --repo "$GH_REPO" "$asset.sig" "$asset.pem"
          done
